# ==================== 会话管理配置 ====================
session:
  storage_type: "file"  # memory 或 file
  file_path: "data/sessions.json"
  max_sessions_per_user: 100

# ==================== 日志配置 ====================
logging:
  log_file: "logs/onebot_client.log"
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  console_format: "[%(asctime)s] %(levelname)s - %(message)s"
  date_format: "%H:%M:%S"
  
  # 文件处理器配置
  file_handler:
    enabled: true
    max_bytes: 10485760  # 10MB
    backup_count: 5
    encoding: "utf-8"
  
  # 控制台处理器配置
  console_handler:
    enabled: true
  
  # 错误日志单独保存
  error_log_separate:
    enabled: true
    error_log_file: "logs/onebot_client_error.log"
    max_bytes: 5242880  # 5MB
    backup_count: 3

# ==================== 文件处理配置 ====================
file_handling:
  download_dir: "downloads"
  auto_download: true
  max_file_size: 52428800  # 50MB
  allowed_extensions: []  # 空列表表示允许所有类型
  naming_strategy: "original"  # original, timestamp, random
  cleanup_old_files: true
  cleanup_days: 7
  napcat_temp_dir: "\\\\wsl.localhost\\Ubuntu-22.04\\root\\.config\\QQ\\NapCat\\temp"
  download_wait_time: 2  # 秒
  continue_on_download_fail: true
  include_file_path_in_message: true
  file_message_prefix: "用户发送了一个文件，文件路径："

# ==================== 特殊回复配置 ====================
special_replies:
  enabled: false
  keywords: {}

# ==================== 消息处理配置 ====================
message:
  max_length: 10000
  stream_response: true
  retry_count: 3
  retry_delay: 1000  # 毫秒

# ==================== 定时任务调度器配置 ====================
task_scheduler:
  check_interval: 5  # 检查间隔（秒）


