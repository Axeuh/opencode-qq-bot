# Axeuh_home QQ 机器人配置文件
# 使用 YAML 格式，便于修改和管理

# ==================== 基础配置 ====================
bot:
  name: "我的 QQ 机器人"
  qq_id: ""  # 机器人 QQ 号
  admin_qq: ""
  debug: false  # 生产环境建议设为 false

# ==================== napcat WebSocket 配置 ====================
websocket:
  url: "ws://localhost:3002"
  access_token: "CqC5dDMXWGUu6NVh"
  heartbeat_interval: 30000  # 心跳间隔（毫秒）
  reconnect_interval: 5000   # 重连间隔（毫秒）
  extra_headers: {}

# ==================== napcat HTTP API 配置 ====================
http_api:
  base_url: "http://localhost:3001"  # NapCat HTTP API 地址
  access_token: "fZvJ-zo_TzyAHOoI"
  timeout: 30  # 请求超时（秒）
  enabled: true  # 是否启用 HTTP API
  retry_count: 3  # 重试次数
  retry_delay: 1.0  # 重试延迟（秒）

# ==================== HTTP 服务器配置 ====================
http_server:
  enabled: true           # 是否启用 HTTP 服务器
  host: "127.0.0.1"       # 监听地址
  port: 4090              # 监听端口
  access_token: ""        # API 访问令牌（可选，留空则不需要认证）

# ==================== 功能开关 ====================
features:
  whitelist_filter: true   # 白名单过滤
  poke_reply: true         # 戳一戳回复
  mention_bot: true        # @机器人检测

# ==================== 白名单配置 ====================
whitelist:
  qq_users:
    - 123456789
    - 123456789

  groups:
    - 123456789
    - 123456789


# ==================== OpenCode 配置 ====================
