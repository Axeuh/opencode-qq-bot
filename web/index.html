<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenCode Web Console</title>
    
    <!-- 内联关键CSS确保loading立即显示 -->
    <style>
        /* 全局Loading遮罩层 */
        #global-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        #global-loading.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #global-loading .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #e0e5ec;
            border-top-color: #89CFF0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #global-loading .loading-text {
            margin-top: 16px;
            color: #666;
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 页面内容初始隐藏 */
        body > *:not(#global-loading) {
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }
        body.loaded > *:not(#global-loading) {
            opacity: 1;
        }
        body.loaded #global-loading {
            display: none;
        }
    </style>
    
    <!-- 第三方库 - 使用defer非阻塞加载 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" media="print" onload="this.media='all'">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    
    <!-- 样式 -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 全局Loading遮罩层 -->
    <div id="global-loading">
        <div class="spinner"></div>
        <div class="loading-text">正在加载 OpenCode...</div>
    </div>

    <div class="sidebar-overlay"></div>

    <div class="sidebar">
        <div class="user-header">
            <img id="userAvatar" class="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Guest&backgroundColor=89CFF0" alt="Avatar">
            <div class="user-name" id="userName">Guest</div>
            <button class="settings-btn" onclick="document.getElementById('settingsModal').style.display='flex'">
                <i class="fas fa-cog"></i>
            </button>
        </div>

        <div class="session-list" id="sessionList">
            <div class="loading-placeholder" style="text-align:center;padding:20px;color:#999;">
                <div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0 auto 8px;"></div>
                加载会话中...
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="btn-new" onclick="createSession()"><i class="fas fa-plus"></i> 新建会话</button>
        </div>
    </div>

    <div class="main-area">
        
        <div class="message-flow" id="messageFlow">
            <div class="message-header" id="messageHeader">
                <div class="message-header-left">
                    <button class="sidebar-toggle" id="sidebarToggle" title="切换侧边栏">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="message-header-title" id="messageTitle" style="cursor: pointer;" title="点击编辑标题">请选择会话</div>
                    <span class="session-path-header" id="sessionPathHeader" style="display: none; margin-left: 12px; font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40%; min-width: 50px; flex: 0 1 auto; cursor: pointer;" title="点击编辑路径"></span>
                </div>
                <div class="message-header-right" style="display: flex; align-items: center; gap: 12px;">
                    <div class="token-info" id="tokenInfo" style="font-size: 12px; color: var(--text-sub);">
                        <i class="fas fa-coins" style="margin-right: 4px;"></i>
                        <span id="tokenCount">0</span> tokens
                    </div>
                    <div class="message-header-menu">
                        <button class="menu-btn" id="menuBtn" title="更多选项">
                            <i class="fas fa-ellipsis-v"></i>
                        </button>
                        <div class="menu-dropdown" id="menuDropdown">
                            <div class="menu-item" onclick="copySessionId()">
                                <i class="fas fa-copy"></i> 复制当前会话ID
                            </div>
                            <div class="menu-item" onclick="openInOpenCodeWeb()">
                                <i class="fas fa-external-link-alt"></i> 从OpenCode Web打开
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="message-content" id="messageContent">
                <div class="empty-state" id="emptyState">
                    <i class="fas fa-comments"></i>
                    <p>选择一个会话开始聊天</p>
                    <p style="font-size: 12px; margin-top: 8px;">或点击「新建会话」开始新对话</p>
                </div>
            </div>
        </div>

        <div class="input-area">
            
            <div class="input-top-bar">
                <div class="config-bar">
                    <div class="custom-select" id="modelSelect">
                        <div class="select-selected" data-value=""><span class="select-selected-text">选择模型</span></div>
                        <div class="select-items" id="modelItems">
                            <!-- 模型列表动态生成 -->
                        </div>
                    </div>
                    
                    <div class="custom-select" id="agentSelect">
                        <div class="select-selected" data-value=""><span class="select-selected-text">选择智能体</span></div>
                        <div class="select-items" id="agentItems">
                            <!-- 智能体列表动态生成 -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="filePreviewArea" class="file-preview-area" style="display:none;">
                <!-- 文件预览卡片会动态添加到这里 -->
            </div>

            <div class="input-row">
                <textarea class="msg-input" id="chatInput" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)" disabled></textarea>
                <button class="send-btn" id="sendBtn" title="发送 (Enter)" disabled><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

    </div>

    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">登录 OpenCode</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>QQ 号</label>
                    <input type="text" class="form-input" id="loginQQ" placeholder="请输入您的 QQ 号">
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>密码</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn btn-save" style="width:100%;margin-top:16px;" onclick="handleLogin()">登录</button>
            </div>
        </div>
    </div>

    <!-- 设置密码弹窗 -->
    <div class="modal-overlay" id="setPasswordModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">设置密码</div>
                <button class="close-btn" onclick="document.getElementById('setPasswordModal').style.display='none'">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p style="font-size:13px;color:#666;margin-bottom:16px;">首次登录需要设置密码，密码长度至少6位</p>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" class="form-input" id="newPassword" placeholder="请输入新密码（至少6位）">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入密码">
                </div>
                <button class="btn btn-save" style="width:100%;margin-top:16px;" onclick="handleSetPassword()">确认设置</button>
            </div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal-overlay" id="changePasswordModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">修改密码</div>
                <button class="close-btn" onclick="document.getElementById('changePasswordModal').style.display='none'">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>原密码</label>
                    <input type="password" class="form-input" id="oldPassword" placeholder="请输入原密码">
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" class="form-input" id="changeNewPassword" placeholder="请输入新密码（至少6位）">
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" class="form-input" id="changeConfirmPassword" placeholder="请再次输入新密码">
                </div>
                <button class="btn btn-save" style="width:100%;margin-top:16px;" onclick="handleChangePassword()">确认修改</button>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">账号设置</div>
                <button class="close-btn" onclick="document.getElementById('settingsModal').style.display='none'">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>当前 QQ 号</label>
                    <input type="text" class="form-input" id="currentQQ" readonly>
                </div>
                <button class="btn btn-save" style="width:100%;margin-top:8px;" onclick="document.getElementById('settingsModal').style.display='none';document.getElementById('changePasswordModal').style.display='flex';">
                    <i class="fas fa-key" style="margin-right:8px;"></i>修改密码
                </button>
                <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="document.getElementById('settingsModal').style.display='none'">关闭</button>
            </div>
        </div>
    </div>

    <!-- 应用入口 -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
